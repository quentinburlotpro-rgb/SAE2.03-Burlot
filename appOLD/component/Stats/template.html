<section class="stats-section">
    <h2 class="category-title">Aperçu de la plateforme</h2>
    <div class="stats-grid">
        
        <div class="stat-card">
            <div class="stat-icon" style="color: #00d2d3;">👥</div>
            <h3>Profils créés</h3>
            <p class="stat-value">{{total_profiles}}</p>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon" style="color: #ff7675;">❤️</div>
            <h3>Favoris par profil (Moy.)</h3>
            <p class="stat-value">{{avg_favorites}}</p>
        </div>

        <div class="stat-card">
            <div class="stat-icon" style="color: #a29bfe;">🎬</div>
            <h3>Films au catalogue</h3>
            <p class="stat-value">{{total_movies}}</p>
        </div>

        <div class="stat-card stat-card-large">
            <div class="stat-icon" style="color: #fdcb6e;">🏆</div>
            <h3>Film le plus favori</h3>
            <p class="stat-value text-fit">{{top_movie}}</p>
        </div>

        <div class="stat-card stat-card-large">
            <div class="stat-icon" style="color: #55efc4;">🔥</div>
            <h3>Catégorie préférée</h3>
            <p class="stat-value text-fit">{{top_category}}</p>
        </div>

    </div>
</section>
