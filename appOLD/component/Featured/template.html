<div class="featured-banner">
    <img src="../server/images/{{image}}" alt="Affiche de {{name}}" class="featured-bg">
    
    <div class="featured-overlay">
        
        <div class="featured-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#ff7675" stroke="none">
                <path d="M12 2C12 2 7 7.5 7 13.5C7 16.5 9 19.5 11.5 21C10.5 18 12.5 15.5 13.5 14C15 16.5 16 18.5 15.5 21C18.5 19.5 21 15.5 21 11.5C21 6.5 12 2 12 2Z"></path>
            </svg>
            Mis en avant
        </div>
        
        <div class="featured-content">
                        
            <h2 class="featured-title">{{name}}</h2>
            <p class="featured-desc">{{description}}</p>
                
                <a href="javascript:void(0);" onclick="C.handlerGetDetails('{{id}}')" class="btn-watch">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    Voir les détails
                </a>
            </div>
            
        </div>
    </div>
</div>
