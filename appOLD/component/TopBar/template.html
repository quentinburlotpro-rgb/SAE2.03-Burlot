<header class="topbar">
    <div class="search-container">
            <input type="text" class="search-input" placeholder="Rechercher un film..." oninput="C.handlerSearch(this.value)">        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
    </div>

    <div class="topbar-right">
        <div class="topbar-profile">
            <div class="profile-avatar">
                <img id="currentAvatar" src="" alt="" style="display:none; width:100%; height:100%; border-radius:50%; object-fit:cover;">
                <svg id="defaultAvatarIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <select id="topbarProfileSelect" onchange="{{handlerProfile}}">
                <option value="">Profil...</option>
                {{profileOptions}}
            </select>
        </div>

        <button class="logout-btn" title="Déconnexion" onclick="{{handlerLogout}}">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        </button>
    </div>
</header>
