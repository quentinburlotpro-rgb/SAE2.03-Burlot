<header class="top-navbar">
    
    <span class="logo">TV4</span>
    
    <nav class="nav-menu">
        <a href="javascript:void(0);" class="active" onclick="C.handlerHome()">Home</a>
        <a href="javascript:void(0);" onclick="C.handlerFavorites()">Mes favoris</a>
        <a href="javascript:void(0);" onclick="C.handlerAbout()">A propos</a>
        <a href="javascript:void(0);" onclick="C.handlerStats()">Statistiques</a>
    </nav>
    
    <div class="nav-actions">
        
        <button id="navSearchToggleBtn" class="nav-icon-btn" onclick="C.handlerToggleSearch()">
            <svg id="icon-search-loupe" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            
            <svg id="icon-search-close" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        <div class="topbar-profile">
            <div class="profile-avatar">
                <img id="currentAvatar" src="" alt="" style="display:none;">
                <svg id="defaultAvatarIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <select id="ProfileSelect" onchange="C.handlerSelectProfile(this.value)">
                <option value="">Profil...</option>
                {{profileOptions}}
            </select>
        </div>
        <button class="logout-btn" title="Déconnexion" onclick="C.handlerLogout()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        </button>
        
    </div>
</header>
