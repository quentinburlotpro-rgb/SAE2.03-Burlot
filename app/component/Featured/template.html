<div class="hero-banner" style="background-image: url('../server/images/{{image}}');">
    
    <div class="hero-vignette"></div>

    <div class="hero-content">
        <span class="hero-badge-black">Mis en avant</span>
        
        <h1 class="hero-title">{{name}}</h1>
        
        <div class="hero-meta">
            <span class="badge-age">{{min_age}}+</span>
            <span class="meta-text">{{year}}</span>
            <span class="meta-text">{{length}} min</span>
        </div>
        
        <p class="hero-description">{{description}}</p>
        
        <div class="hero-actions">
            <button class="btn-primary" onclick="C.handlerGetDetails('{{id}}')">Voir les détails</button>
            
            <button class="btn-icon {{favClass}}" onclick="C.handlerToggleFavorite('{{id}}')" title="Favoris">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="{{fillColor}}" stroke="currentColor" stroke-width="2">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
            </button>
        </div>
    </div>
</div>
