<section class="stats-container">
<h2 class="stats-title">Statistiques</h2>
    <div class="stats-grid">
        <div class="stat-card">
                <span class="stat-label">Profils créés</span>
                <span class="stat-number">{{total_profiles}}</span>
        </div>

        <div class="stat-card">
                <span class="stat-label">Films disponibles</span>
                <span class="stat-number">{{total_movies}}</span>
        </div>

        <div class="stat-card">
                <span class="stat-label">Moyenne de favoris</span>
                <span class="stat-number">{{avg_favorites}}</span>
        </div>

        <div class="stat-card featured-stat">
                <span class="stat-label">Film le plus aimé</span>
                <span class="stat-text">{{top_movie}}</span>
        </div>

        <div class="stat-card featured-stat">
                <span class="stat-label">Catégorie phare</span>
                <span class="stat-text">{{top_category}}</span>
        </div>
    </div>
</section>
