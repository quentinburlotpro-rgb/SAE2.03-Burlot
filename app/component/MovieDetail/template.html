<div class="movie-detail-container">

    <div class="hero-banner" style="background-image: url('../server/images/{{image}}');">
        
        <div class="hero-vignette"></div>

        <div class="hero-content">
            <span class="hero-badge-black">{{category_name}}</span>
            
            <h1 class="hero-title">{{name}}</h1>
            
            <div class="hero-meta">
                <span class="badge-age">{{min_age}}+</span>
                <span class="meta-text">{{year}}</span>
                <span class="meta-text">{{length}} min</span>
                <span class="meta-text">Réalisé par <strong style="color: white;">{{director}}</strong></span>
            </div>
            
            <p class="hero-description">{{description}}</p>
            
            <div class="hero-actions">
                <a href="#trailer-section" class="btn-primary" style="text-decoration: none; display: inline-flex; align-items: center; gap: 8px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    Bande-annonce
                </a>
                
                <button class="btn-icon {{favClass}}" onclick="C.handlerToggleFavorite('{{id}}')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="{{fillColor}}" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div id="trailer-section" class="movie-trailer-section">
        <h2>Trailer</h2>
        <div class="iframe-container">
            <iframe 
                src="{{trailer}}" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

</div>
