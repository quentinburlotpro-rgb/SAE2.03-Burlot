<article class="movie-card">
  <div class="movie-card__image-wrapper">
    <img 
      src="../server/images/{{image}}" 
      alt="Affiche de {{title}}" 
      class="movie-card__image"
    />
  </div>
  <div class="movie-card__content">
    <h3 class="movie-card__title">{{title}}</h3>
  </div>
</article>
