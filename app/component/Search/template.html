<div class="search-page-container">
    <div class="search-header">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" placeholder="Chercher un film ou une série..." oninput="C.handlerSearch(this.value)" autofocus>
    </div>

    <div class="search-filters">
        <button class="filter-btn active" onclick="C.handlerFilterSearch('Tout')">Tout</button>
        {{categories_html}}
    </div>

    <div class="results-header">
        <h2>Contenu correspondant <span id="searchCount">0</span></h2>
    </div>

    <div id="searchResults" class="search-grid">
    </div>
</div>
