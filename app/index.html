<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

<body>
    <div class="app-container">
        <header id="header"></header>
        <main id="content"></main>
    </div>

<script type="module">
    import { NavBar } from "./component/NavBar/script.js";
    import { Movie } from "./component/Movie/script.js";
    import { MovieCategory } from './component/MovieCategory/script.js';
    import { MovieDetail } from './component/MovieDetail/script.js';
    import { DataMovie } from "./data/dataMovie.js";
    import { DataProfile } from "./data/dataProfile.js";
    import { Featured } from './component/Featured/script.js';
    import { Stats } from './component/Stats/script.js';
    import { DataStats } from './data/dataStats.js';
    import { Search } from './component/Search/script.js';

    window.C = {};
    window.V = {};

    let view = "home";
    C.isSearchOpen = false;

    C.handlerHome = async function() {
        view = "home";
        C.isSearchOpen = false;
        V.toggleSearchIcon(false);

        let ageLimit = DataProfile.getActiveAgeLimit();
        let featured = await DataMovie.requestFeatured(ageLimit);
        let movies = await DataMovie.requestMovies(ageLimit);
        document.getElementById("content").classList = "";
        V.renderHome(featured, movies);
    };

    C.handlerFavorites = async function() {
        view = "favorites";
        C.isSearchOpen = false;
        V.toggleSearchIcon(false);

        let profil = DataProfile.activeProfileId;
        if (!profil) {
            return V.renderMessage("Veuillez sélectionner un profil pour voir vos favoris.");
        } else {
            let movies = await DataProfile.getFullFavorites();            
            if (!movies || movies.length === 0) {
                return V.renderMessage("Aucun film dans vos favoris.");
            } else {
                document.getElementById("content").classList = "favorites-grid";
                V.renderMovies([{ category_name: "Mes Favoris", movies: movies }], DataProfile.favoriteMovieIds);
            }
        }
    };

    C.handlerSelectProfile = async function(profileId) {
        let profile = await DataProfile.setActiveProfile(profileId);
        if (!profile) {
            V.updateAvatar("");
        } else {
            V.updateAvatar(profile.avatar);
        }
        C.handlerHome(); 
    };

    C.handlerStats = async function() {  
        view = "stats";
        C.isSearchOpen = false;
        V.toggleSearchIcon(false);

        let data = await DataStats.requestStats(); 
        V.renderStats(data);
    };

    C.handlerToggleFavorite = async function(movieId) {
        let profil = DataProfile.activeProfileId;
        if (!profil) {
            return V.renderMessage("Veuillez d'abord sélectionner un profil.");
        }
        
        await DataProfile.toggleFavorite(movieId);
        
        if (view === "favorites") {
            C.handlerFavorites();
        } else if (view === "home") {
            C.handlerHome();
        } else if (view === "detail") {
            C.handlerGetDetails(movieId);
        } else if (view === "search") {
            let texteRecherche = V.getSearchInputValue();
            C.handlerSearch(texteRecherche);
        }
    };

    C.handlerGetDetails = async function(movieId) {
        view = "detail";
        let movie = await DataMovie.requestMovieDetail(movieId);        
        V.renderMovieDetail(movie);
    };

    C.handlerLogout = function() {
        V.resetProfileSelect();
        C.handlerSelectProfile("");
    };

    C.handlerAbout = function() {
        V.renderMessage("Projet SAE 2.03 - Application de streaming de films\n\nDéveloppé par : Burlot Quentin");
    };

    C.handlerToggleSearch = async function() {
        C.isSearchOpen = !C.isSearchOpen;
        V.toggleSearchIcon(C.isSearchOpen);

        if (C.isSearchOpen) {
            view = "search";
            
            let ageLimit = DataProfile.getActiveAgeLimit();
            let categories = await DataMovie.requestMovies(ageLimit);
            
            V.renderSearch(categories); 
            C.handlerSearch("");
        } else {
            C.handlerHome();
        }
    };

    C.handlerSearch = async function(query) {
        let ageLimit = DataProfile.getActiveAgeLimit();
        let filmsTrouves = await DataMovie.search(ageLimit, query);

        if (!filmsTrouves) {
            filmsTrouves = [];
        }

        V.updateSearchResults(filmsTrouves);
    };

    V.getSearchInputValue = function() {
        let input = document.getElementById('searchInput');
        return input ? input.value : "";
    };

    V.toggleSearchIcon = function(isOpen) {
        let iconLoupe = document.getElementById('icon-search-loupe');
        let iconClose = document.getElementById('icon-search-close');
        
        if (iconLoupe && iconClose) {
            iconLoupe.style.display = isOpen ? 'none' : 'block';
            iconClose.style.display = isOpen ? 'block' : 'none';
        }
    };

    V.renderMessage = function(message) {
        alert(message);
    };

    V.renderSearch = function(categories) {
        let content = document.querySelector("#content");
        content.innerHTML = Search.format(categories);
        document.getElementById('searchInput').focus();
    };

    V.updateSearchResults = function(movies) {
        let resultsDiv = document.getElementById("searchResults");
        let countSpan = document.getElementById("searchCount");
        
        if (resultsDiv && countSpan) {
            countSpan.innerText = movies.length;
            if (movies.length > 0) {
                resultsDiv.innerHTML = Movie.formatMany(movies, DataProfile.favoriteMovieIds);
            } else {
                resultsDiv.innerHTML = "<p style='grid-column: 1 / -1; color: #a3a3a3;'>Désolé, aucun contenu ne correspond à votre recherche.</p>";
            }
        }
    };

    V.updateAvatar = function(avatarUrl) {
        let img = document.querySelector("#currentAvatar");
        let svg = document.querySelector("#defaultAvatarIcon");
        
        if (avatarUrl && avatarUrl !== "") {
            img.src = "../server/profilePP/" + avatarUrl;
            img.style.display = "block";
            svg.style.display = "none";
        } else {
            img.style.display = "none";
            svg.style.display = "block";
        }
    };

    V.resetProfileSelect = function() {
        document.querySelector("#ProfileSelect").value = "";
    };

    V.renderNavBar = function(profiles) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(profiles);
    };

    V.renderHome = function(featured, movies) {
        let content = document.querySelector("#content");
        content.innerHTML = Featured.format(featured, DataProfile.favoriteMovieIds) + MovieCategory.formatMany(movies, DataProfile.favoriteMovieIds);
    };

    V.renderMovies = function(groupedMovies, favIds = []) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieCategory.formatMany(groupedMovies, favIds);
    };

    V.renderStats = function(data) {
        let content = document.querySelector("#content");
        content.innerHTML = Stats.format(data);
        content.scrollTop = 0;
    };

    V.renderMovieDetail = function(movie) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(movie, DataProfile.favoriteMovieIds);
    };

    C.start = async function () {  
        let profiles = await DataProfile.requestProfiles();
        V.renderNavBar(profiles); 
        
        C.handlerHome(); 
    };

    C.start();
</script>
</body>
</html>
