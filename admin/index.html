<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SAE2.03 ADMIN</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./component/MovieForm/style.css" />
    <link rel="stylesheet" href="./component/ProfileForm/style.css" />
</head>
<body>
    <div class="admin-header">
        <h1><span>TV</span>4 - Administration</h1>
    </div>

    <section id="log"></section>
    <section id="form"></section>

    <script type="module">
        import { Log } from "./component/Log/script.js";
        import { MovieForm } from "./component/MovieForm/script.js";
        import { ProfileForm } from "./component/ProfileForm/script.js";
        import { DataMovie } from "./data/dataMovie.js";
        import { DataProfile } from "./data/dataProfile.js";

        window.C = {};
        window.V = {};

        C.handlerAddMovie = async function() {
            V.renderLog("Envoi du film en cours...");
            
            let formData = V.getMovieFormData();
            if (await DataMovie.add(formData)) {
                V.renderLog("Film ajouté avec succès !");
                V.resetMovieForm();
            }
        };

        C.handlerSelectProfile = function(id) {
            let currentProfile = DataProfile.setCurrentEdit(id);
            
            if (currentProfile) {
                V.renderLog("Mode modification activé pour : " + currentProfile.name);
            } else {
                V.renderLog("Mode création de profil activé.");
            }
            
            let profiles = DataProfile.getProfiles();
            let currentEdit = DataProfile.getCurrentEdit();
            V.renderForm(profiles, currentEdit);
        };

        C.handlerSaveProfile = async function() {
            V.renderLog("Enregistrement du profil en cours...");
            
            let formData = V.getProfileFormData();
            if (await DataProfile.save(formData)) {
                V.renderLog("Profil enregistré avec succès.");
                DataProfile.setCurrentEdit("");
                
                await DataProfile.requestProfiles();
                let profiles = DataProfile.getProfiles();
                let currentEdit = DataProfile.getCurrentEdit();
                V.renderForm(profiles, currentEdit);
            } else {
                V.renderLog("Erreur lors de l'enregistrement.");
            }
        };

        V.getMovieFormData = function() {
            let form = document.querySelector("#movieForm");
            return form ? new FormData(form) : new FormData();
        };

        V.resetMovieForm = function() {
            let form = document.querySelector("#movieForm");
            if (form) form.reset();
        };

        V.getProfileFormData = function() {
            let form = document.querySelector("#profileForm");
            return form ? new FormData(form) : new FormData();
        };

        V.renderForm = function(profiles, currentEdit) {
            document.querySelector("#form").innerHTML = 
                MovieForm.format("C.handlerAddMovie()") + 
                ProfileForm.format("C.handlerSaveProfile()", profiles, currentEdit);
        };

        V.renderLog = function(txt) {
            document.querySelector("#log").innerHTML = Log.format(txt);
        };

        C.start = async function() {
            await DataProfile.requestProfiles();
            let profiles = DataProfile.getProfiles();
            let currentEdit = DataProfile.getCurrentEdit();
            
            V.renderForm(profiles, currentEdit);
            V.renderLog("Application d'administration prête.");        
        };

        C.start();
    </script>
</body>
</html>
