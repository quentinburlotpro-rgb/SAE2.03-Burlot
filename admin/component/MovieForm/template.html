<form class="movie-form" id="movieForm">
  <div class="form-group">
    <label for="name" class="form-label">Titre du film *</label>
    <input 
      type="text" 
      id="name" 
      name="name" 
      class="form-input" 
      required
      placeholder="Ex: Inception"
    />
  </div>

  <div class="form-group">
    <label for="director" class="form-label">Réalisateur *</label>
    <input 
      type="text" 
      id="director" 
      name="director" 
      class="form-input" 
      required
      placeholder="Ex: Christopher Nolan"
    />
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="year" class="form-label">Année de sortie *</label>
      <input 
        type="number" 
        id="year" 
        name="year" 
        class="form-input" 
        required
        min="1900"
        max="2100"
        placeholder="Ex: 2010"
      />
    </div>

    <div class="form-group">
      <label for="length" class="form-label">Durée (minutes) *</label>
      <input 
        type="number" 
        id="length" 
        name="length" 
        class="form-input" 
        required
        min="1"
        placeholder="Ex: 148"
      />
    </div>

    <div class="form-group">
      <label for="min_age" class="form-label">Restriction d'âge *</label>
      <input 
        type="number" 
        id="min_age" 
        name="min_age" 
        class="form-input" 
        required
        min="0"
        max="18"
        placeholder="Ex: 12"
      />
    </div>
  </div>

  <div class="form-group">
    <label for="description" class="form-label">Description/Synopsis *</label>
    <textarea 
      id="description" 
      name="description" 
      class="form-textarea" 
      required
      rows="4"
      placeholder="Décrivez le film..."
    ></textarea>
  </div>

  <div class="form-group">
    <label for="id_category" class="form-label">Catégorie *</label>
    <select id="id_category" name="id_category" class="form-select" required>
      <option value="">-- Sélectionnez une catégorie --</option>
      <option value="1">Action</option>
      <option value="2">Comédie</option>
      <option value="3">Drame</option>
      <option value="4">Science-fiction</option>
      <option value="5">Animation</option>
      <option value="6">Thriller</option>
      <option value="7">Horreur</option>
      <option value="8">Aventure</option>
      <option value="9">Fantaisie</option>
      <option value="10">Documentaire</option>
    </select>
  </div>

  <div class="form-group">
    <label for="image" class="form-label">Nom du fichier de l'affiche *</label>
    <input 
      type="text" 
      id="image" 
      name="image" 
      class="form-input" 
      required
      placeholder="Ex: inception.jpg"
    />
    <small class="form-hint">Les fichiers doivent être placés dans le dossier server/images</small>
  </div>

  <div class="form-group">
    <label for="trailer" class="form-label">URL du trailer (embed YouTube)</label>
    <input 
      type="url" 
      id="trailer" 
      name="trailer" 
      class="form-input"
      placeholder="Ex: https://www.youtube.com/embed/..."
    />
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Ajouter le film</button>
    <button type="reset" class="btn btn-secondary">Réinitialiser</button>
  </div>
</form>
